<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플랜드 버프 타이머</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        h1 { color: #f1c40f; }
        .download-btn {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            margin: 25px 0;
            transition: 0.2s;
        }
        .download-btn:hover { background-color: #c0392b; transform: scale(1.05); }
        .description { text-align: left; line-height: 1.6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍁 메이플랜드 버프 타이머</h1>
        <p>복잡한 버프 시간, 이제 신경 쓰지 말고 사냥에만 집중하세요!</p>

        <a href="여기에_구글드라이브_링크_붙여넣기" class="download-btn" target="_blank">
            📥 프로그램 다운로드 (.exe)
        </a>

        <div class="description">
            <h3>✨ 주요 기능</h3>
            <ul>
                <li>직관적인 UI와 간편한 단축키 조작</li>
                <li>게임 화면 최상단 고정 기능</li>
            </ul>
            <h3>⚙️ 사용 방법</h3>
            <p>1. 위 버튼을 눌러 파일을 다운로드합니다.<br>
               2. 다운로드한 <strong>main.exe</strong> 파일을 실행합니다.<br>
               3. 윈도우 PC 보호 알림이 뜨면 '추가 정보' -> '실행'을 클릭하세요.</p>
        </div>
    </div>
</body>
</html>
